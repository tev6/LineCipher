<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LineCipher</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.08);
        --card2: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
        --primary: #6aa6ff;
        --primary2: #8b5cf6;
        --danger: #ff6a7a;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f3f6ff;
          --card: rgba(255, 255, 255, 0.85);
          --card2: rgba(255, 255, 255, 0.65);
          --border: rgba(15, 23, 42, 0.12);
          --text: rgba(15, 23, 42, 0.92);
          --muted: rgba(15, 23, 42, 0.62);
          --shadow: 0 20px 70px rgba(2, 6, 23, 0.12);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--sans);
        background: radial-gradient(1100px 650px at 20% 10%, rgba(106, 166, 255, 0.35), transparent 55%),
          radial-gradient(900px 650px at 85% 35%, rgba(139, 92, 246, 0.28), transparent 55%),
          radial-gradient(900px 650px at 50% 120%, rgba(99, 102, 241, 0.22), transparent 55%), var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .wrap {
        width: min(980px, 100%);
      }

      .card {
        background: linear-gradient(180deg, var(--card), var(--card2));
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(14px);
      }

      header {
        padding: 18px 18px 12px 18px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.2px;
        font-weight: 700;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .pillbar {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: light) {
        .pillbar {
          background: rgba(255, 255, 255, 0.65);
        }
      }

      .pillbar button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 10px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 650;
      }

      .pillbar button.active {
        background: linear-gradient(135deg, rgba(106, 166, 255, 0.35), rgba(139, 92, 246, 0.28));
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding: 14px 18px 18px 18px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.06);
      }

      @media (prefers-color-scheme: light) {
        .panel {
          background: rgba(255, 255, 255, 0.55);
        }
      }

      .panelHead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .panelHead .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      .panelBody {
        padding: 12px;
      }

      textarea {
        width: 100%;
        min-height: 210px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.14);
        color: var(--text);
        padding: 12px 12px;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
        outline: none;
      }

      @media (prefers-color-scheme: light) {
        textarea {
          background: rgba(255, 255, 255, 0.82);
        }
      }

      textarea:focus {
        border-color: rgba(106, 166, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(106, 166, 255, 0.18);
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.14);
        overflow: auto;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
        white-space: pre;
        min-height: 210px;
      }

      @media (prefers-color-scheme: light) {
        pre {
          background: rgba(255, 255, 255, 0.82);
        }
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px 18px 18px;
      }

      .leftActions,
      .rightActions {
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 650;
      }

      .btn.primary {
        border-color: rgba(106, 166, 255, 0.5);
        background: linear-gradient(135deg, rgba(106, 166, 255, 0.24), rgba(139, 92, 246, 0.18));
      }

      .btn.danger {
        border-color: rgba(255, 106, 122, 0.5);
        background: linear-gradient(135deg, rgba(255, 106, 122, 0.16), rgba(255, 106, 122, 0.08));
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .err {
        color: var(--danger);
        font-size: 12px;
      }

      .chips {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.08);
        font-family: var(--mono);
      }

      @media (prefers-color-scheme: light) {
        .chip {
          background: rgba(255, 255, 255, 0.65);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <header>
          <div>
            <h1>LineCipher</h1>
            <p class="subtitle">把文本编码成三行线条，或把三行线条解码回文本</p>
          </div>
          <div class="pillbar" role="tablist" aria-label="mode">
            <button id="modeEncode" class="active" type="button">编码</button>
            <button id="modeDecode" type="button">解码</button>
          </div>
        </header>

        <div class="grid">
          <section class="panel">
            <div class="panelHead">
              <div class="label" id="inputLabel">输入文本</div>
              <div class="chips">
                <span class="chip" id="charsetChip"></span>
              </div>
            </div>
            <div class="panelBody">
              <textarea
                id="input"
                spellcheck="false"
                placeholder="编码：输入一段文本（仅支持指定字符集）&#10;解码：粘贴三行 LineCipher（包含底行的 | 分隔符）"
              ></textarea>
            </div>
          </section>

          <section class="panel">
            <div class="panelHead">
              <div class="label">输出结果</div>
              <div class="chips">
                <span class="chip" id="statusChip">就绪</span>
              </div>
            </div>
            <div class="panelBody">
              <pre id="output" aria-label="output"></pre>
            </div>
          </section>
        </div>

        <div class="actions">
          <div class="leftActions">
            <button class="btn primary" id="run" type="button">运行</button>
            <button class="btn" id="swap" type="button">切换</button>
            <button class="btn danger" id="clear" type="button">清空</button>
          </div>
          <div class="rightActions">
            <span class="hint" id="hint"></span>
            <span class="err" id="err"></span>
            <button class="btn" id="copy" type="button">复制输出</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      "use strict";

      const CHS = " etaoinsrhlcdumfpwgbyvkxjqz1234567890,./>@()!";

      let TOP = [];
      let MID = [];
      let BOT = [];
      let initialized = false;

      function dfs(cur, pre, x, maxX, out) {
        if (x === maxX) {
          let div = 1;
          for (let i = 1; i < x; i += 1) div *= 10;
          const fst = x > 0 ? Math.floor(cur / div) : 0;
          const lst = x > 0 ? cur % 10 : 0;
          const badFst = fst === 2 || fst === 4 || fst === 5 || fst === 7;
          const badLst = lst === 1 || lst === 4 || lst === 6 || lst === 7;
          if (badFst || badLst) return;
          out.push(cur);
          return;
        }

        const validPairs = new Set([
          "1,2",
          "1,4",
          "2,1",
          "2,3",
          "2,6",
          "3,1",
          "3,3",
          "3,6",
          "4,2",
          "4,4",
          "5,1",
          "5,3",
          "5,6",
          "6,5",
          "6,7",
          "7,5",
          "7,7",
        ]);

        for (let i = 1; i <= 7; i += 1) {
          if (((pre >> i) & 1) === 1) continue;
          if (x > 0) {
            const lastDigit = cur % 10;
            if (!validPairs.has(`${lastDigit},${i}`)) continue;
          }
          dfs(cur * 10 + i, pre | (1 << i), x + 1, maxX, out);
        }
      }

      function drawLine(num) {
        let t = "";
        let m = "";
        let b = "";
        const txt = String(num);
        for (const c of txt) {
          if (c === "1") {
            t += " ";
            m += "/";
            b += " ";
          } else if (c === "2") {
            t += " ";
            m += "\\";
            b += " ";
          } else if (c === "3") {
            t += " ";
            m += "_";
            b += " ";
          } else if (c === "4") {
            t += "_";
            m += " ";
            b += " ";
          } else if (c === "5") {
            t += " ";
            m += " ";
            b += "/";
          } else if (c === "6") {
            t += " ";
            m += " ";
            b += "\\";
          } else if (c === "7") {
            t += " ";
            m += " ";
            b += "_";
          }
        }
        t += " ";
        m += " ";
        b += "|";
        return { t, m, b };
      }

      function init() {
        if (initialized) return;
        TOP = new Array(100).fill("");
        MID = new Array(100).fill("");
        BOT = new Array(100).fill("");

        let cnt = 0;
        for (let maxX = 1; maxX <= 7; maxX += 1) {
          const list = [];
          dfs(0, 0, 0, maxX, list);
          for (let i = 0; i < list.length; i += 1) {
            const { t, m, b } = drawLine(list[i]);
            TOP[cnt] = t;
            MID[cnt] = m;
            BOT[cnt] = b;
            cnt += 1;
          }
        }
        initialized = true;
      }

      function encode(input) {
        init();
        const bad = new Set();
        for (const ch of input) {
          if (CHS.indexOf(ch) === -1) bad.add(ch);
        }
        if (bad.size > 0) {
          const badList = Array.from(bad)
            .map((c) => (c === " " ? "␠(空格)" : c))
            .join(" ");
          throw new Error(`包含不支持字符：${badList}`);
        }

        let top = "";
        let mid = "";
        let bot = "";
        for (const ch of input) {
          const idx = CHS.indexOf(ch);
          top += TOP[idx];
          mid += MID[idx];
          bot += BOT[idx];
        }
        return `${top}|\n${mid}|\n${bot}\n`;
      }

      function defineLine(xtop, xmid, xbot) {
        init();
        const max = Math.min(100, CHS.length);
        for (let i = 0; i < max; i += 1) {
          if (TOP[i] === xtop && MID[i] === xmid && BOT[i] === xbot) return CHS[i];
        }
        return "?";
      }

      function decode(raw) {
        init();
        const lines = raw.replace(/\r/g, "").split("\n").filter((l) => l.length > 0);
        if (lines.length < 3) {
          throw new Error("解码需要三行输入（上、中、下三行）");
        }
        let itop = lines[0];
        let imid = lines[1];
        let ibot = lines[2];

        if (itop.endsWith("|")) itop = itop.slice(0, -1) + " ";
        if (imid.endsWith("|")) imid = imid.slice(0, -1) + " ";

        const sep = [-1];
        for (let i = 0; i < ibot.length; i += 1) {
          if (ibot[i] === "|") sep.push(i);
        }
        if (sep.length <= 1) {
          throw new Error("底行没有找到分隔符 |");
        }

        let out = "";
        for (let i = 0; i + 1 < sep.length; i += 1) {
          const l = sep[i] + 1;
          const r = sep[i + 1];
          out += defineLine(itop.slice(l, r + 1), imid.slice(l, r + 1), ibot.slice(l, r + 1));
        }
        return out;
      }

      const els = {
        modeEncode: document.getElementById("modeEncode"),
        modeDecode: document.getElementById("modeDecode"),
        inputLabel: document.getElementById("inputLabel"),
        input: document.getElementById("input"),
        output: document.getElementById("output"),
        run: document.getElementById("run"),
        swap: document.getElementById("swap"),
        clear: document.getElementById("clear"),
        copy: document.getElementById("copy"),
        err: document.getElementById("err"),
        hint: document.getElementById("hint"),
        statusChip: document.getElementById("statusChip"),
        charsetChip: document.getElementById("charsetChip"),
      };

      let mode = "encode";

      function setMode(next) {
        mode = next;
        els.modeEncode.classList.toggle("active", mode === "encode");
        els.modeDecode.classList.toggle("active", mode === "decode");
        els.inputLabel.textContent = mode === "encode" ? "输入文本" : "输入 LineCipher（三行）";
        els.hint.textContent =
          mode === "encode" ? "回车可直接运行；输出为三行线条" : "粘贴三行线条后运行；输出为原文";
        els.err.textContent = "";
        els.statusChip.textContent = "就绪";
      }

      function run() {
        els.err.textContent = "";
        try {
          if (mode === "encode") {
            const out = encode(els.input.value);
            els.output.textContent = out;
            els.statusChip.textContent = "编码完成";
          } else {
            const out = decode(els.input.value);
            els.output.textContent = out;
            els.statusChip.textContent = "解码完成";
          }
        } catch (e) {
          els.output.textContent = "";
          els.err.textContent = e instanceof Error ? e.message : String(e);
          els.statusChip.textContent = "出错";
        }
      }

      els.modeEncode.addEventListener("click", () => setMode("encode"));
      els.modeDecode.addEventListener("click", () => setMode("decode"));
      els.run.addEventListener("click", run);
      els.swap.addEventListener("click", () => setMode(mode === "encode" ? "decode" : "encode"));
      els.clear.addEventListener("click", () => {
        els.input.value = "";
        els.output.textContent = "";
        els.err.textContent = "";
        els.statusChip.textContent = "就绪";
      });
      els.copy.addEventListener("click", async () => {
        const txt = els.output.textContent || "";
        if (!txt) return;
        try {
          await navigator.clipboard.writeText(txt);
          els.statusChip.textContent = "已复制";
        } catch {
          const ta = document.createElement("textarea");
          ta.value = txt;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
          els.statusChip.textContent = "已复制";
        }
      });

      els.input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && (ev.ctrlKey || ev.metaKey)) {
          ev.preventDefault();
          run();
        }
      });

      function boot() {
        init();
        els.charsetChip.textContent = `charset=${CHS.length}`;
        setMode("encode");
        els.input.value = "hello! my name is josh! nice to meet you!";
        run();
      }

      boot();
    </script>
  </body>
</html>
